<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        gap: 20px;
        height: 100vh;
        background-color: rgb(182, 184, 182);
    }

    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        width: 70vh;
        height: 80vh;
        border: 2px solid rgb(93, 45, 0);
        background-color: rgb(248, 245, 245);
        background-color: rgba(82, 49, 0, 0.824);
        border-radius: 23px;

    }

    .box h1 {
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Poppins", sans-serif;
        font-weight: 400;
        border: 2px solid rgb(255, 255, 255);
        margin-top: 20px;
        margin-left: 40px;
        margin-right: 40px;
        border-radius: 20px;
        background-color: white;
        color: rgb(156, 108, 5);
    }

    .box2 {
        border: 2px solid rgb(255, 255, 255);
        height: 63vh;
        width: 60vh;
        margin: auto;
        margin-top: 23px;
        margin-left: 40px;
        margin-right: 40px;
        background-color: white;
        border-radius: 20px;
        box-sizing: border-box;
        overflow: hidden;
        padding: 15px;

    }

    ul {
        list-style: none;
        padding: 0;
        margin: 0;
        padding: 10px;
    }

    li {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
        gap: 10px;
        box-sizing: border-box;
        width: 100%;
        padding: 3px 0;
        margin-top: 10px;
    }

    input[type="checkbox"] {
        width: 20px;
        height: 30px;
        cursor: pointer;

    }

    li:last-child {
        border-bottom: none;
    }

    .task {
        border: none;
        border-bottom: 2px solid rgb(156, 108, 5);
        background: transparent;
        width: 100%;
        font-size: 20px;
        outline: none;
        padding: 1px 0;
        font-family: "Poppins", sans-serif;
    }

    .check:checked+.task {
        text-decoration: line-through;
        color: rgb(0, 0, 0);
    }

    #addBtn {
        display: block;
        margin: 8pc auto;
        padding: 8px 20px;
        border: none;
        cursor: pointer;
        background-color: rgb(126, 77, 3);
        color: white;
        margin-top: 20px;
        border-radius: 15px;
        font-family: "Poppins", sans-serif;

    }
</style>

<body>
    <div class="container">
        <div class="box">
            <h1> TO DO LIST 🗒️</h1>
            <div class="box2">
                <ul>
                    <li>
                        <input type="checkbox" class="check">
                        <input type=text class="task" placeholder="Enter task">
                    </li>

                    <li>
                        <input type="checkbox" class="check">
                        <input type="text" class="task" placeholder="Enter task">
                    </li>
                    <li>
                        <input type="checkbox" class="check">
                        <input type="text" class="task" placeholder="Enter task">
                    </li>
                    <li>
                        <input type="checkbox" class="check">
                        <input type="text" class="task" placeholder="Enter task">
                    <li>
                        <input type="checkbox" class="check">
                        <input type="text" class="task" placeholder="Enter task">
                    </li>
                    <li>
                        <input type="checkbox" class="check">
                        <input type="text" class="task" placeholder="Enter task">
                    <li>
                        <input type="checkbox" class="check">
                        <input type="text" class="task" placeholder="Enter task">   
                    </li>
                    <li>
                        <input type="checkbox" class="check">
                        <input type="text" class="task" placeholder="Enter task">
                    </li>
                </ul>

            </div>
        </div>
    </div>

</body>

</html>
